services:
  db:
    image: postgres:16
    container_name: arlet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arlet_odoo}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arlet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build: .
    container_name: arlet-odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD}
      ODOO_MASTER_PASSWORD: ${ODOO_MASTER_PASSWORD}
      # AWS S3 for file/image storage
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_BUCKETNAME: ${AWS_BUCKETNAME:-arlet-odoo-storage}
      ARLET_API_KEY: ${ARLET_API_KEY:-}
      ARLET_ODOO_BASE: ${ARLET_ODOO_BASE:-https://odoo.arletretreats.com}
      ARLET_WEB_BASE: ${ARLET_WEB_BASE:-https://arletretreats.com}
    volumes:
      - ./data/odoo:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    networks:
      - arlet-network
    # No ports exposed directly — Nginx proxies from outside

  nginx:
    image: nginx:stable-alpine
    container_name: arlet-nginx
    restart: unless-stopped
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - arlet-network

volumes:
  postgres_data:

networks:
  arlet-network:
    driver: bridge
