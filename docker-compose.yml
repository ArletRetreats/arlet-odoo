services:
  db:
    image: postgres:16
    container_name: arlet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arlet_odoo}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arlet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    build: .
    container_name: arlet-odoo
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      # AWS S3 for file/image storage
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_BUCKETNAME: ${AWS_BUCKETNAME:-arlet-odoo-storage}
      ARLET_API_KEY: ${ARLET_API_KEY:-}
      ARLET_ODOO_BASE: ${ARLET_ODOO_BASE:-http://localhost:8069}
      ARLET_WEB_BASE: ${ARLET_WEB_BASE:-http://localhost:3000}
    ports:
      - "${ODOO_PORT:-8069}:8069"
    volumes:
      - ./data/odoo:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    networks:
      - arlet-network

volumes:
  postgres_data:

networks:
  arlet-network:
    driver: bridge
