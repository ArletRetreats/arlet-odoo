user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name odoo.arletretreats.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — Odoo reverse proxy
    server {
        listen 443 ssl;
        server_name odoo.arletretreats.com;

        ssl_certificate     /etc/letsencrypt/live/odoo.arletretreats.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/odoo.arletretreats.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Max upload size (for Odoo attachments)
        client_max_body_size 100m;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Odoo longpolling (gevent port)
        location /longpolling {
            proxy_pass http://odoo:8072;
            proxy_read_timeout 3600s;
        }

        # All other requests → Odoo
        location / {
            proxy_pass http://odoo:8069;
            proxy_read_timeout 720s;
            proxy_connect_timeout 720s;
            proxy_send_timeout 720s;
        }

        # Static assets — cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://odoo:8069;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
